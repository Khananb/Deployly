# Define the rate limit zone in the http block (this must go in nginx.conf, but we provide it here for reference)
# limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name deployly.online www.deployly.online *.deployly.online;

    # Include Security Configurations
    include /etc/nginx/snippets/security.conf;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Root for static assets if needed
    root /var/www/deployly/frontend/build;
    index index.html;

    # 1. API Reverse Proxy (Node.js Backend)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Static Websites Hosting (Direct Nginx Serving for Extreme Performance)
    # The Node.js app uploads sites here. We serve them directly to bypass Node.js overhead.
    location /sites/ {
        alias /var/www/deployly/storage/sites/;
        autoindex off;
        
        # Include MIME types
        include /etc/nginx/mime.types;
        
        # Cache headers for static assets
        expires 30d;
        add_header Cache-Control "public, no-transform";
        
        # Security: Prevent executing scripts in the upload/sites directories
        location ~ \.(php|pl|py|jsp|sh|cgi)$ {
            deny all;
        }
    }

    # 3. Frontend App (React/Vue/etc)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Short cache for HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Custom Error Pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
