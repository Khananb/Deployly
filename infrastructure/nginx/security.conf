# Security Headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;
add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Rate Limiting (requires corresponding limit_req_zone in nginx.conf)
# Example: limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;
limit_req zone=one burst=20 nodelay;

# Body Size limit to prevent large file upload abuse (adjust if you need larger uploads)
client_max_body_size 50M;

# Hidden Files Protection
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Disable Directory Listing globally
autoindex off;
